version: '3'

vars:
  VAGRANT_ROUTEROS_PLUGIN_VERSION:
    sh: jq -r '.vagrant_routeros_plugin_version' vagrant-plugins-routeros/vagrant_routeros_plugin_version.json
  VAGRANT_ROUTEROS_PLUGIN_PATH: vagrant-plugins-routeros/pkg/vagrant-routeros-{{.VAGRANT_ROUTEROS_PLUGIN_VERSION}}.gem
  ROS_VERSION_6:
    sh: echo "${ROS_VERSION_6:-$(curl -s http://upgrade.mikrotik.com/routeros/LATEST.6 | cut -d' ' -f1)}"
  ROS_VERSION_6_LONG_TERM:
    sh: echo "${ROS_VERSION_6_LONG_TERM:-$(curl -s http://upgrade.mikrotik.com/routeros/LATEST.6fix | cut -d' ' -f1)}"
  ROS_VERSION_7:
    sh: echo "${ROS_VERSION_7:-$(curl -s http://upgrade.mikrotik.com/routeros/NEWESTa7.stable | cut -d' ' -f1)}"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
      - echo "Examples:"
      - echo "  ROS_VERSION_6=6.49.10 task routeros"
      - echo "  ROS_VERSION_6_LONG_TERM=6.48.7 task routeros-long-term"
      - echo "  ROS_VERSION_7=7.15.1 task routeros7"
    silent: true

  check-plugin-gem:
    desc: Check if the vagrant-routeros plugin gem exists
    cmds:
      - |
        test -f {{.VAGRANT_ROUTEROS_PLUGIN_PATH}} || (echo "Plugin gem file not found: {{.VAGRANT_ROUTEROS_PLUGIN_PATH}}. Use build-plugin task to build it" && exit 1)
    internal: true
    silent: true

  build-plugin:
    desc: Build the vagrant-routeros plugin using Docker
    cmds:
      - |
        docker run --rm -v $(pwd):/packer-routeros -w /packer-routeros/vagrant-plugins-routeros ruby:3.4 \
          sh -c "bundle install && bundle exec rake build"
      - |
        docker run --rm -v $(pwd):/packer-routeros -w /packer-routeros/vagrant-plugins-routeros ruby:3.4 \
          sh -c "chown -R $(id -u):$(id -g) pkg Gemfile.lock"

  build-box:
    internal: true
    silent: true
    vars:
      BOX_FILE_NAME: build/boxes/{{.ROUTEROS_BRANCH}}_{{.ROS_VERSION}}.box
      DESCRIPTION_FILE: build/boxes/{{.ROUTEROS_BRANCH}}_{{.ROS_VERSION}}.md
    cmds:
      - echo "Building RouterOS {{.ROS_VERSION}}"
      - echo "Running packer init..."
      - packer init routeros.pkr.hcl
      - echo "Building the box..."
      - |
        packer build -var "ros_ver={{.ROS_VERSION}}" \
          -var "box_file_name={{.BOX_FILE_NAME}}" \
          -var-file vagrant-plugins-routeros/vagrant_routeros_plugin_version.json \
          -on-error=cleanup -force routeros.pkr.hcl
      - echo "Writing '{{.DESCRIPTION_FILE}}'"
      - |
        cat > {{.DESCRIPTION_FILE}} <<EOF
        **Updated ROS to version {{.ROS_VERSION}}**<br>
        https://github.com/cheretbe/packer-routeros/blob/master/README.md
        EOF

  routeros:
    desc: Build RouterOS 6 box
    deps:
      - check-plugin-gem
    cmds:
      - task: build-box
        vars:
          ROUTEROS_BRANCH: routeros
          ROS_VERSION: "{{.ROS_VERSION_6}}"

  routeros-long-term:
    desc: Build RouterOS 6 long-term box
    deps:
      - check-plugin-gem
    cmds:
      - task: build-box
        vars:
          ROUTEROS_BRANCH: routeros-long-term
          ROS_VERSION: "{{.ROS_VERSION_6_LONG_TERM}}"

  routeros7:
    desc: Build RouterOS 7 stable box
    deps:
      - check-plugin-gem
    cmds:
      - task: build-box
        vars:
          ROUTEROS_BRANCH: routeros7
          ROS_VERSION: "{{.ROS_VERSION_7}}"

  ping-test:
    internal: true
    silent: true
    dir: tests/vagrant_local
    cmds:
      - |
        echo "vagrant ssh {{.VM_NAME}} -- /ping count=3 {{.PING_TARGET}}"
        ping_output=$(vagrant ssh {{.VM_NAME}} -- /ping count=3 {{.PING_TARGET}})
        echo "$ping_output"
        echo "$ping_output" | grep -q "received=3"
        echo "$ping_output" | grep -q "packet-loss=0%"

  run-vagrant-test:
    desc: Run vagrant up in tests directory
    internal: true
    dir: tests/vagrant_local
    cmds:
      - vagrant up
      - task: ping-test
        vars: {VM_NAME: host1, PING_TARGET: 192.168.199.11}
      - task: ping-test
        vars: {VM_NAME: host1, PING_TARGET: 192.168.199.12}
      - task: ping-test
        vars: {VM_NAME: host2, PING_TARGET: 192.168.199.10}
      - task: ping-test
        vars: {VM_NAME: host2, PING_TARGET: 192.168.199.12}
      - task: ping-test
        vars: {VM_NAME: host3, PING_TARGET: 192.168.199.10}
      - task: ping-test
        vars: {VM_NAME: host3, PING_TARGET: 192.168.199.11}
      - vagrant destroy -f

  test:
    desc: Register temporary vagrant boxes and run some tests on them
    cmds:
      - vagrant box add --force packer_test_routeros build/boxes/routeros_{{.ROS_VERSION_6}}.box
      - vagrant box add --force packer_test_routeros-long-term build/boxes/routeros-long-term_{{.ROS_VERSION_6_LONG_TERM}}.box
      - vagrant box add --force packer_test_routeros7 build/boxes/routeros7_{{.ROS_VERSION_7}}.box
      - task: run-vagrant-test
      - vagrant box remove -f packer_test_routeros
      - vagrant box remove -f packer_test_routeros-long-term
      - vagrant box remove -f packer_test_routeros7

  cleanup:
    desc: Clean up build artifacts and temporary files
    cmds:
      - rm -vf vagrant-plugins-routeros/pkg/*.gem
      - rm -vf vagrant-plugins-routeros/Gemfile.lock
      - rm -vrf build/boxes

  build:
    desc: Build and test all RouterOS boxes
    cmds:
      - task: cleanup
      - task: build-plugin
      - task: routeros
      - task: routeros-long-term
      - task: routeros7
      - task: test
